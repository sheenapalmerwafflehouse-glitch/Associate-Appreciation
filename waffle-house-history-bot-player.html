<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Waffle House History Bot Player</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #0000;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    }

    .bot-shell {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(180deg, rgba(255,255,255,0.98), rgba(255,250,231,0.98));
    }

    .bot-frame {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: transparent;
    }

    .sound-prompt {
      position: fixed;
      left: 50%;
      bottom: max(18px, env(safe-area-inset-bottom));
      transform: translateX(-50%);
      z-index: 20;
      border: 1px solid rgba(176, 150, 44, 0.18);
      border-radius: 999px;
      background: linear-gradient(180deg, #ffe66a, #f5d547);
      color: #111;
      font-weight: 900;
      font-size: 0.95rem;
      padding: 12px 18px;
      box-shadow: 0 10px 22px rgba(17,17,17,0.14);
      cursor: pointer;
      display: none;
      white-space: nowrap;
    }

    .sound-prompt.show {
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>
<body>
  <main class="bot-shell">
    <iframe
      class="bot-frame"
      id="history-bot-frame"
      src="waffle-house-history-bot.html"
      title="Waffle House History Bot"
      allow="autoplay"
    ></iframe>
  </main>

  <button id="sound-prompt" class="sound-prompt" type="button">
    Tap to start sound
  </button>

  <audio id="history-audio" preload="auto" loop>
    <source src="audio/GOOD FOOD FAST.mp3" type="audio/mpeg" />
  </audio>

  <script>
    const audio = document.getElementById("history-audio");
    const soundPrompt = document.getElementById("sound-prompt");
    let isClosing = false;

    async function startAudio() {
      try {
        audio.currentTime = 0;
        await audio.play();
        soundPrompt.classList.remove("show");
      } catch (error) {
        soundPrompt.classList.add("show");
      }
    }

    function stopAudio() {
      audio.pause();
      audio.currentTime = 0;
      soundPrompt.classList.remove("show");
    }

    function closeBotPage() {
      isClosing = true;
      stopAudio();

      if (window.history.length > 1) {
        window.history.back();
      } else {
        window.location.href = "index.html";
      }
    }

    soundPrompt.addEventListener("click", async () => {
      try {
        await audio.play();
        soundPrompt.classList.remove("show");
      } catch (error) {
        console.log("Audio still blocked:", error);
      }
    });

    window.addEventListener("message", (event) => {
      if (event.data === "close-waffle-history-bot") {
        closeBotPage();
      }
    });

    document.addEventListener("visibilitychange", () => {
      if (document.hidden) {
        stopAudio();
      } else if (!isClosing) {
        startAudio();
      }
    });

    window.addEventListener("pagehide", stopAudio);
    window.addEventListener("beforeunload", stopAudio);

    window.addEventListener("load", () => {
      startAudio();
    });
  </script>
</body>
</html>
