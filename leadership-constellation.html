<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Leadership Constellation</title>
  <style>
    :root {
      --text: #111111;
      --muted: #5a5a5a;
      --yellow: #f5d547;
      --yellow-dark: #d7b31a;
      --border: rgba(176, 150, 44, 0.18);
      --shadow: 0 14px 30px rgba(17, 17, 17, 0.10);
      --shadow-strong: 0 20px 44px rgba(17, 17, 17, 0.16);
      --radius: 28px;
      --space-a: #0f1932;
      --space-b: #13224a;
      --space-c: #102446;
      --space-d: #0b1831;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      overflow-x: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, #faf8f2 0%, #f2eee1 40%, #e8e3d1 100%);
    }

    body { padding: 18px; }

    .page {
      width: min(100%, 1180px);
      margin: 0 auto;
      display: grid;
      gap: 16px;
    }

    .card {
      background: rgba(255,255,255,0.92);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    .top-row {
      display: flex;
      justify-content: center;
    }

    .back-link,
    .btn,
    .chip {
      appearance: none;
      border: 1px solid rgba(176, 150, 44, 0.18);
      border-radius: 20px;
      min-height: 50px;
      padding: 12px 18px;
      font: inherit;
      font-weight: 800;
      cursor: pointer;
      background: #fff;
      color: #1f1f1f;
      box-shadow: 0 8px 16px rgba(17,17,17,0.08);
      transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease, border-color 0.18s ease;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      white-space: nowrap;
    }

    .back-link:hover,
    .btn:hover,
    .chip:hover {
      transform: translateY(-1px);
      box-shadow: 0 12px 20px rgba(17,17,17,0.12);
    }

    .btn.primary,
    .chip.active {
      background: linear-gradient(180deg, #ffe66a 0%, var(--yellow) 100%);
      border-color: rgba(212, 176, 0, 0.28);
    }

    .hero {
      padding: 26px 22px;
      text-align: center;
      background:
        radial-gradient(circle at 50% 18%, rgba(255,255,255,0.82) 0%, rgba(255,255,255,0) 24%),
        linear-gradient(180deg, #fff1a6 0%, #ffe66a 42%, #f5d547 100%);
      overflow: hidden;
      position: relative;
    }

    .hero::before,
    .hero::after {
      content: "";
      position: absolute;
      border-radius: 999px;
      pointer-events: none;
      opacity: 0.55;
    }

    .hero::before {
      width: 220px;
      height: 220px;
      left: -34px;
      top: -54px;
      background: radial-gradient(circle, rgba(255,255,255,0.52) 0%, rgba(255,255,255,0) 72%);
    }

    .hero::after {
      width: 240px;
      height: 240px;
      right: -60px;
      bottom: -80px;
      background: radial-gradient(circle, rgba(255,255,255,0.32) 0%, rgba(255,255,255,0) 72%);
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 9px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.9);
      border: 1px solid rgba(212, 176, 0, 0.18);
      color: #6f5f00;
      font-size: 0.8rem;
      font-weight: 900;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 14px;
      position: relative;
      z-index: 1;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 5vw, 3.2rem);
      line-height: 0.96;
      letter-spacing: -0.03em;
      text-transform: uppercase;
      position: relative;
      z-index: 1;
    }

    .panel {
      padding: 18px;
      display: grid;
      gap: 16px;
    }

    .controls {
      display: grid;
      gap: 14px;
      padding: 16px;
      border-radius: 22px;
      background: linear-gradient(180deg, rgba(255,255,255,0.96), rgba(255,249,228,0.96));
      border: 1px solid rgba(176, 150, 44, 0.16);
    }

    .controls-top {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
    }

    .chip {
      min-height: 42px;
      border-radius: 999px;
      padding: 8px 14px;
      box-shadow: 0 6px 12px rgba(17,17,17,0.05);
    }

    .status-note {
      text-align: center;
      color: #6a6a6a;
      font-size: 0.92rem;
      line-height: 1.45;
      min-height: 22px;
    }

    .status-note.error {
      color: #b12727;
      font-weight: 700;
    }

    .hint {
      display: none;
      text-align: center;
      font-size: 0.78rem;
      line-height: 1.42;
      font-weight: 800;
      color: #7b6c00;
      padding: 14px 18px;
      border-radius: 28px;
      background: rgba(255, 247, 200, 0.92);
      border: 1px solid rgba(212, 176, 0, 0.18);
      box-shadow: 0 8px 18px rgba(92, 77, 19, 0.08);
    }

    .hint.show { display: block; }

    .stage-scroll {
      width: 100%;
      overflow: visible;
    }

    .stage {
      position: relative;
      overflow: hidden;
      border-radius: 28px;
      border: 1px solid rgba(176, 150, 44, 0.16);
      background:
        radial-gradient(circle at 58% 20%, rgba(255,255,255,0.17) 0%, rgba(255,255,255,0) 21%),
        linear-gradient(180deg, var(--space-a) 0%, var(--space-b) 42%, var(--space-c) 70%, var(--space-d) 100%);
      box-shadow: var(--shadow-strong);
      aspect-ratio: 16 / 10;
      min-height: 560px;
      isolation: isolate;
    }

    .stage.single-role-mobile {
      width: 100%;
    }

    canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      z-index: 1;
    }

    .focus-badge,
    .allrole-label {
      position: absolute;
      z-index: 4;
      pointer-events: none;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(12, 24, 52, 0.84);
      border: 1px solid rgba(255,255,255,0.16);
      color: rgba(255,255,255,0.96);
      font-size: 0.74rem;
      font-weight: 900;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      backdrop-filter: blur(4px);
      white-space: nowrap;
      box-shadow: 0 10px 18px rgba(0,0,0,0.18);
    }

    .focus-badge.active {
      background: rgba(255, 230, 106, 0.92);
      color: #1d1d1d;
      border-color: rgba(255,255,255,0.25);
    }

    .focus-badge.hidden,
    .allrole-label.hidden {
      opacity: 0;
      visibility: hidden;
    }

    .allrole-label {
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    #allLabelEVP { right: 18px; top: 18px; }
    #allLabelSVP { right: 18px; top: 66px; }
    #allLabelArea { left: 18px; top: 132px; }
    #allLabelDivision { left: 18px; top: 188px; }
    #allLabelDistrict { left: 18px; top: 244px; }
    #allLabelUnit { left: 18px; top: 300px; }

    .focus-badge {
      top: 18px;
      right: 18px;
      display: none;
    }

    .ship-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 3;
    }

    @media (max-width: 900px) {
      .stage { min-height: 500px; }
    }

    @media (max-width: 700px) {
      body { padding: 12px; }
      .card, .stage { border-radius: 24px; }

      .stage-scroll {
        overflow-x: auto;
        overflow-y: hidden;
        -webkit-overflow-scrolling: touch;
        margin-inline: -2px;
        padding-bottom: 4px;
        scrollbar-width: thin;
      }

      .stage {
        width: clamp(720px, 168vw, 980px);
        min-height: 520px;
      }

      .stage.single-role-mobile {
        width: 100%;
        min-height: 500px;
      }

      .focus-badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 0.68rem;
        padding: 7px 11px;
        max-width: calc(100% - 32px);
        top: 14px;
        left: 50%;
        right: auto;
        transform: translateX(-50%);
      }

      .allrole-label {
        display: none;
      }
    }

    @media (max-width: 520px) {
      .stage {
        width: clamp(680px, 175vw, 920px);
        min-height: 500px;
      }

      .stage.single-role-mobile {
        width: 100%;
        min-height: 480px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="top-row">
      <a href="index.html" class="back-link" target="_top" rel="noopener">← Back to Celebration Page</a>
    </div>

    <section class="card hero">
      <div class="eyebrow">Leadership Lights the Way</div>
      <h1>Leadership Constellation</h1>
    </section>

    <section class="card panel">
      <div class="controls">
        <div class="controls-top">
          <button id="resetBtn" class="btn" type="button">Reset View</button>
        </div>

        <div class="chip-row" id="filterChips"></div>

        <div class="status-note" id="statusNote">Loading leadership data...</div>
      </div>

      <div class="hint" id="scrollHint">Swipe left or right to see the full leadership constellation.</div>

      <div class="stage-scroll" id="stageScroll">
        <div class="stage" id="stage">
          <canvas id="skyCanvas" aria-hidden="true"></canvas>

          <div class="allrole-label hidden" id="allLabelEVP">EVP</div>
          <div class="allrole-label hidden" id="allLabelSVP">SVP</div>
          <div class="allrole-label hidden" id="allLabelArea">Area / Region</div>
          <div class="allrole-label hidden" id="allLabelDivision">Division</div>
          <div class="allrole-label hidden" id="allLabelDistrict">District</div>
          <div class="allrole-label hidden" id="allLabelUnit">Unit</div>

          <div class="focus-badge hidden" id="focusBadge">Role</div>
          <div class="ship-layer" id="shipLayer"></div>
        </div>
      </div>
    </section>
  </main>

  <script>
    const CSV_URL = "leaders.csv";
    const SHIP_SRC = "spaceship.png"; // change to your exact file name if needed

    const ROLE_META = [
      {
        key: "executive_vice_president",
        label: "Executive Vice President",
        short: "EVP",
        countLabel: "EVP",
        single: { cx: 0.72, cy: 0.36, rx: 0.18, ry: 0.11, size: 5.0 },
        all: { cx: 0.88, cy: 0.18, rx: 0.08, ry: 0.08, size: 4.9, lineAlpha: 0.34 }
      },
      {
        key: "senior_vice_president",
        label: "Senior Vice President",
        short: "SVP",
        countLabel: "SVP",
        single: { cx: 0.67, cy: 0.42, rx: 0.20, ry: 0.12, size: 4.5 },
        all: { cx: 0.78, cy: 0.31, rx: 0.09, ry: 0.08, size: 4.4, lineAlpha: 0.30 }
      },
      {
        key: "area_region_manager",
        label: "Area / Region Manager",
        short: "Area / Region",
        countLabel: "Area / Region",
        single: { cx: 0.71, cy: 0.52, rx: 0.24, ry: 0.14, size: 4.0 },
        all: { cx: 0.67, cy: 0.45, rx: 0.12, ry: 0.09, size: 4.0, lineAlpha: 0.26 }
      },
      {
        key: "division_manager",
        label: "Division Manager",
        short: "Division",
        countLabel: "Division",
        single: { cx: 0.70, cy: 0.58, rx: 0.25, ry: 0.14, size: 3.7 },
        all: { cx: 0.56, cy: 0.60, rx: 0.12, ry: 0.08, size: 3.6, lineAlpha: 0.22 }
      },
      {
        key: "district_manager",
        label: "District Manager",
        short: "District",
        countLabel: "District",
        single: { cx: 0.67, cy: 0.69, rx: 0.28, ry: 0.11, size: 3.1 },
        all: { cx: 0.43, cy: 0.73, rx: 0.11, ry: 0.075, size: 3.1, lineAlpha: 0.18 }
      },
      {
        key: "unit_manager",
        label: "Unit Manager",
        short: "Unit",
        countLabel: "Unit",
        single: { cx: 0.58, cy: 0.79, rx: 0.31, ry: 0.10, size: 1.85 },
        all: { cx: 0.28, cy: 0.84, rx: 0.17, ry: 0.065, size: 1.75, lineAlpha: 0.0 }
      }
    ];

    const ROLE_ORDER = [
      "unit_manager",
      "district_manager",
      "division_manager",
      "area_region_manager",
      "senior_vice_president",
      "executive_vice_president"
    ];

    const ROLE_META_MAP = Object.fromEntries(ROLE_META.map(role => [role.key, role]));

    const ROLE_ALIAS_MAP = {
      executive_vice_president: ["executive vice president", "executive_vice_president", "evp"],
      senior_vice_president: ["senior vice president", "senior_vice_president", "svp"],
      area_region_manager: ["area region manager", "area/region manager", "area_region_manager", "area / region manager", "region manager", "area manager"],
      division_manager: ["division manager", "division_manager"],
      district_manager: ["district manager", "district_manager"],
      unit_manager: ["unit manager", "unit_manager", "manager"]
    };

    const HEADER_ALIASES = {
      name: ["name", "full name", "leader", "person"],
      role: ["role", "title", "level"]
    };

    const DEMO_LEADERS = [
      { name: "Jordan Mitchell", role: "Executive Vice President" },
      { name: "Casey Reynolds", role: "Senior Vice President" },
      { name: "Taylor Brooks", role: "Area / Region Manager" },
      { name: "Devon Price", role: "Area / Region Manager" },
      { name: "Harper Stone", role: "Division Manager" },
      { name: "Morgan Hayes", role: "Division Manager" },
      { name: "Dakota Lane", role: "Division Manager" },
      { name: "Avery Bennett", role: "District Manager" },
      { name: "Jamie Palmer", role: "District Manager" },
      { name: "Alex Turner", role: "District Manager" },
      { name: "Sydney Morgan", role: "Unit Manager" },
      { name: "Parker Reed", role: "Unit Manager" },
      { name: "Taylor James", role: "Unit Manager" },
      { name: "Riley Carter", role: "Unit Manager" }
    ];

    const canvas = document.getElementById("skyCanvas");
    const ctx = canvas.getContext("2d");
    const staticCanvas = document.createElement("canvas");
    const staticCtx = staticCanvas.getContext("2d");

    const stage = document.getElementById("stage");
    const stageScroll = document.getElementById("stageScroll");
    const scrollHint = document.getElementById("scrollHint");
    const filterChips = document.getElementById("filterChips");
    const resetBtn = document.getElementById("resetBtn");
    const statusNote = document.getElementById("statusNote");
    const focusBadge = document.getElementById("focusBadge");

    const allLabels = {
      executive_vice_president: document.getElementById("allLabelEVP"),
      senior_vice_president: document.getElementById("allLabelSVP"),
      area_region_manager: document.getElementById("allLabelArea"),
      division_manager: document.getElementById("allLabelDivision"),
      district_manager: document.getElementById("allLabelDistrict"),
      unit_manager: document.getElementById("allLabelUnit")
    };

    let leaders = [];
    let roleCounts = {};
    let totalCount = 0;
    let usingDemoData = false;
    let activeRole = "all";

    let dpr = Math.max(1, window.devicePixelRatio || 1);
    let stageWidth = 0;
    let stageHeight = 0;
    let constellationPoints = {};
    let twinkleStars = [];
    let shipImage = null;
    let animationId = 0;
    let hintDismissed = false;

    function normalizeText(value) {
      return String(value || "")
        .trim()
        .toLowerCase()
        .replace(/\s+/g, " ")
        .replace(/[^\w\s/]/g, "");
    }

    function seededValue(input) {
      let hash = 0;
      const text = String(input || "");
      for (let i = 0; i < text.length; i++) {
        hash = ((hash << 5) - hash) + text.charCodeAt(i);
        hash |= 0;
      }
      return Math.abs(hash) / 2147483647;
    }

    function parseCSVLine(line) {
      const result = [];
      let current = "";
      let inQuotes = false;

      for (let i = 0; i < line.length; i++) {
        const char = line[i];
        const next = line[i + 1];

        if (char === '"' && inQuotes && next === '"') {
          current += '"';
          i++;
          continue;
        }

        if (char === '"') {
          inQuotes = !inQuotes;
          continue;
        }

        if (char === "," && !inQuotes) {
          result.push(current);
          current = "";
          continue;
        }

        current += char;
      }

      result.push(current);
      return result;
    }

    function canonicalRole(rawRole) {
      const normalized = normalizeText(rawRole);
      for (const [roleKey, aliases] of Object.entries(ROLE_ALIAS_MAP)) {
        if (aliases.includes(normalized)) return roleKey;
      }
      return null;
    }

    function parseLeadersCSV(text) {
      const lines = text
        .replace(/^\uFEFF/, "")
        .split(/\r?\n/)
        .filter(line => line.trim().length > 0);

      if (!lines.length) return [];

      const headers = parseCSVLine(lines[0]).map(h => normalizeText(h));
      const rows = lines.slice(1).map(parseCSVLine);

      const longFormIndex = {};
      Object.entries(HEADER_ALIASES).forEach(([key, aliases]) => {
        const idx = headers.findIndex(header => aliases.includes(header));
        if (idx !== -1) longFormIndex[key] = idx;
      });

      const results = [];
      const seen = new Set();

      if (longFormIndex.name !== undefined && longFormIndex.role !== undefined) {
        rows.forEach((row) => {
          const name = (row[longFormIndex.name] || "").trim();
          const roleKey = canonicalRole(row[longFormIndex.role] || "");
          if (!name || !roleKey) return;
          const uniq = `${name.toLowerCase()}|${roleKey}`;
          if (seen.has(uniq)) return;
          seen.add(uniq);
          results.push({ name, roleKey });
        });
        return results;
      }

      const wideHeaderMap = {};
      Object.entries(ROLE_ALIAS_MAP).forEach(([roleKey, aliases]) => {
        const idx = headers.findIndex(header => aliases.includes(header));
        if (idx !== -1) wideHeaderMap[roleKey] = idx;
      });

      if (Object.keys(wideHeaderMap).length) {
        rows.forEach((row) => {
          ROLE_META.forEach((role) => {
            const idx = wideHeaderMap[role.key];
            if (idx === undefined) return;
            const name = (row[idx] || "").trim();
            if (!name) return;
            const uniq = `${name.toLowerCase()}|${role.key}`;
            if (seen.has(uniq)) return;
            seen.add(uniq);
            results.push({ name, roleKey: role.key });
          });
        });
      }

      return results;
    }

    async function loadLeaders() {
      try {
        const response = await fetch(CSV_URL, { cache: "no-store" });
        if (!response.ok) throw new Error("CSV not found");
        const text = await response.text();
        const parsed = parseLeadersCSV(text);
        if (!parsed.length) throw new Error("No usable leader rows found");
        leaders = parsed;
        usingDemoData = false;
      } catch (err) {
        leaders = DEMO_LEADERS.map(item => ({ name: item.name, roleKey: canonicalRole(item.role) }));
        usingDemoData = true;
      }

      roleCounts = {};
      ROLE_META.forEach((role) => {
        roleCounts[role.key] = leaders.filter(leader => leader.roleKey === role.key).length;
      });
      totalCount = leaders.length;

      buildChips();
      updateStatus();
      buildLayout();
      renderStaticScene();
      refreshView();
    }

    function buildChips() {
      filterChips.innerHTML = "";

      const allChip = document.createElement("button");
      allChip.type = "button";
      allChip.className = `chip ${activeRole === "all" ? "active" : ""}`;
      allChip.textContent = `All Roles · ${totalCount.toLocaleString()}`;
      allChip.addEventListener("click", () => {
        activeRole = "all";
        hintDismissed = false;
        refreshView();
      });
      filterChips.appendChild(allChip);

      ROLE_META.forEach((role) => {
        const chip = document.createElement("button");
        chip.type = "button";
        chip.className = `chip ${activeRole === role.key ? "active" : ""}`;
        chip.textContent = `${role.countLabel} · ${(roleCounts[role.key] || 0).toLocaleString()}`;
        chip.addEventListener("click", () => {
          activeRole = role.key;
          refreshView();
        });
        filterChips.appendChild(chip);
      });
    }

    function updateStatus() {
      statusNote.classList.remove("error");

      if (usingDemoData) {
        statusNote.innerHTML = `Showing <strong>${totalCount.toLocaleString()}</strong> demo leaders.`;
        return;
      }

      if (activeRole === "all") {
        statusNote.innerHTML = `Showing <strong>${totalCount.toLocaleString()}</strong> leaders across all role groups.`;
      } else {
        const role = ROLE_META_MAP[activeRole];
        const count = roleCounts[activeRole] || 0;
        statusNote.innerHTML = `Showing <strong>${count.toLocaleString()}</strong> ${role.label}${count === 1 ? "" : "s"}.`;
      }
    }

    function isMobile() {
      return window.innerWidth <= 700;
    }

    function isSingleRole() {
      return activeRole !== "all";
    }

    function buildTwinkleStars() {
      twinkleStars = [];
      const count = isMobile() ? 26 : 40;
      let attempts = 0;

      while (twinkleStars.length < count && attempts < 500) {
        attempts += 1;

        const x = seededValue(`twinkle-x-${attempts}`);
        const y = seededValue(`twinkle-y-${attempts}`);

        const dx = (x - 0.56) / 0.40;
        const dy = (y - 0.58) / 0.28;
        const insideProtectedZone = (dx * dx + dy * dy) < 1.0;

        if (insideProtectedZone && seededValue(`keep-${attempts}`) < 0.85) {
          continue;
        }

        twinkleStars.push({
          x,
          y,
          r: 0.7 + seededValue(`r-${attempts}`) * 1.6,
          alphaBase: 0.12 + seededValue(`a-${attempts}`) * 0.25,
          speed: 0.8 + seededValue(`s-${attempts}`) * 1.6,
          phase: seededValue(`p-${attempts}`) * Math.PI * 2
        });
      }
    }

    function resizeCanvas() {
      const rect = stage.getBoundingClientRect();
      stageWidth = Math.max(1, Math.round(rect.width));
      stageHeight = Math.max(1, Math.round(rect.height));
      dpr = Math.max(1, window.devicePixelRatio || 1);

      canvas.width = Math.round(stageWidth * dpr);
      canvas.height = Math.round(stageHeight * dpr);
      canvas.style.width = `${stageWidth}px`;
      canvas.style.height = `${stageHeight}px`;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      staticCanvas.width = Math.round(stageWidth * dpr);
      staticCanvas.height = Math.round(stageHeight * dpr);
      staticCtx.setTransform(dpr, 0, 0, dpr, 0, 0);

      buildTwinkleStars();
      buildLayout();
      renderStaticScene();
    }

    function getLayout(roleKey) {
      const role = ROLE_META_MAP[roleKey];
      return isSingleRole() && activeRole === roleKey ? role.single : role.all;
    }

    function generatePoints(roleKey, count) {
      const layout = getLayout(roleKey);
      const points = [];
      if (!count) return points;

      const seedBase = seededValue(`seed-${roleKey}`) * Math.PI * 2;
      const golden = 2.399963229728653;

      for (let i = 0; i < count; i++) {
        const t = Math.sqrt((i + 0.5) / count);
        const angle = i * golden + seedBase;
        const jitterX = (seededValue(`${roleKey}-jx-${i}`) - 0.5) * 0.010;
        const jitterY = (seededValue(`${roleKey}-jy-${i}`) - 0.5) * 0.010;

        let rx = layout.rx;
        let ry = layout.ry;

        if (roleKey === "unit_manager") {
          rx *= 0.92 + seededValue(`${roleKey}-rx-${i}`) * 0.14;
          ry *= 0.92 + seededValue(`${roleKey}-ry-${i}`) * 0.14;
        }

        const x = (layout.cx + Math.cos(angle) * rx * t + jitterX) * stageWidth;
        const y = (layout.cy + Math.sin(angle) * ry * t + jitterY) * stageHeight;
        points.push({ x, y, roleKey });
      }

      return points;
    }

    function buildLayout() {
      constellationPoints = {};
      ROLE_META.forEach((role) => {
        constellationPoints[role.key] = generatePoints(role.key, roleCounts[role.key] || 0);
      });
    }

    function drawBackground(targetCtx) {
      const grad = targetCtx.createLinearGradient(0, 0, 0, stageHeight);
      grad.addColorStop(0, "#0f1932");
      grad.addColorStop(0.42, "#13224a");
      grad.addColorStop(0.70, "#102446");
      grad.addColorStop(1, "#0b1831");
      targetCtx.fillStyle = grad;
      targetCtx.fillRect(0, 0, stageWidth, stageHeight);

      const glow = targetCtx.createRadialGradient(
        stageWidth * 0.58, stageHeight * 0.18, 0,
        stageWidth * 0.58, stageHeight * 0.18, stageWidth * 0.28
      );
      glow.addColorStop(0, "rgba(255,255,255,0.17)");
      glow.addColorStop(0.20, "rgba(255,255,255,0.08)");
      glow.addColorStop(1, "rgba(255,255,255,0)");
      targetCtx.fillStyle = glow;
      targetCtx.fillRect(0, 0, stageWidth, stageHeight);
    }

    function drawTwinkleStars(targetCtx, nowMs) {
      const t = nowMs / 1000;
      twinkleStars.forEach((star) => {
        const pulse = 0.55 + 0.45 * Math.sin(t * star.speed + star.phase);
        const alpha = star.alphaBase + pulse * 0.22;

        targetCtx.globalAlpha = Math.max(0.05, Math.min(0.65, alpha));
        targetCtx.fillStyle = "#ffffff";
        targetCtx.beginPath();
        targetCtx.arc(star.x * stageWidth, star.y * stageHeight, star.r, 0, Math.PI * 2);
        targetCtx.fill();

        targetCtx.globalAlpha = Math.max(0.02, Math.min(0.20, alpha * 0.45));
        targetCtx.beginPath();
        targetCtx.arc(star.x * stageWidth, star.y * stageHeight, star.r * 2.4, 0, Math.PI * 2);
        targetCtx.fill();
      });
      targetCtx.globalAlpha = 1;
    }

    function buildAllRoleConnections() {
      const lines = [];
      const pairs = [
        ["district_manager", "unit_manager", 90],
        ["division_manager", "district_manager", 70],
        ["area_region_manager", "division_manager", 48],
        ["senior_vice_president", "area_region_manager", 26],
        ["executive_vice_president", "senior_vice_president", 12]
      ];

      pairs.forEach(([fromKey, toKey, maxLines]) => {
        const fromPts = constellationPoints[fromKey] || [];
        const toPts = constellationPoints[toKey] || [];
        if (!fromPts.length || !toPts.length) return;

        const count = Math.min(maxLines, fromPts.length);
        const stride = Math.max(1, Math.floor(fromPts.length / count));

        for (let i = 0; i < fromPts.length; i += stride) {
          const a = fromPts[i];
          const mapped = Math.min(toPts.length - 1, Math.floor((i / Math.max(1, fromPts.length - 1)) * (toPts.length - 1)));
          const b = toPts[mapped];
          lines.push({ a, b, fromKey });
          if (lines.length >= maxLines && fromKey === "district_manager") break;
        }
      });

      return lines;
    }

    function buildSingleRoleConnections(roleKey) {
      const pts = constellationPoints[roleKey] || [];
      const lines = [];
      if (pts.length < 2) return lines;

      if (roleKey === "unit_manager") {
        const sampleCount = Math.min(220, pts.length);
        const stride = Math.max(1, Math.floor(pts.length / sampleCount));
        for (let i = 0; i < pts.length - stride; i += stride) {
          lines.push({ a: pts[i], b: pts[Math.min(pts.length - 1, i + stride)] });
        }
        return lines;
      }

      const limit = Math.min(pts.length - 1, 95);
      const stride = Math.max(1, Math.floor((pts.length - 1) / Math.max(1, limit)));
      for (let i = 0; i < pts.length - 1; i += stride) {
        lines.push({ a: pts[i], b: pts[Math.min(pts.length - 1, i + stride)] });
      }
      return lines;
    }

    function drawAllRoleLines(targetCtx) {
      const lines = buildAllRoleConnections();
      targetCtx.lineCap = "round";
      targetCtx.lineJoin = "round";

      lines.forEach((line) => {
        const alpha = ROLE_META_MAP[line.fromKey].all.lineAlpha || 0.18;
        targetCtx.strokeStyle = `rgba(255, 230, 106, ${alpha})`;
        targetCtx.lineWidth = line.fromKey === "district_manager" ? 1.15 : 1.0;
        targetCtx.beginPath();
        targetCtx.moveTo(line.a.x, line.a.y);
        targetCtx.lineTo(line.b.x, line.b.y);
        targetCtx.stroke();
      });
    }

    function drawSingleRoleLines(targetCtx, roleKey) {
      const role = ROLE_META_MAP[roleKey];
      const lines = buildSingleRoleConnections(roleKey);
      targetCtx.lineCap = "round";
      targetCtx.lineJoin = "round";

      lines.forEach((line) => {
        targetCtx.strokeStyle = `rgba(255, 230, 106, ${Math.max(0.18, role.all.lineAlpha || 0.18)})`;
        targetCtx.lineWidth = roleKey === "unit_manager" ? 0.9 : 1.1;
        targetCtx.beginPath();
        targetCtx.moveTo(line.a.x, line.a.y);
        targetCtx.lineTo(line.b.x, line.b.y);
        targetCtx.stroke();
      });
    }

    function drawPoint(targetCtx, point, size, alpha) {
      if (alpha <= 0) return;

      targetCtx.globalAlpha = alpha * 0.26;
      targetCtx.fillStyle = "#ffe66a";
      targetCtx.beginPath();
      targetCtx.ellipse(point.x, point.y, size * 1.05, size * 2.25, 0, 0, Math.PI * 2);
      targetCtx.fill();

      targetCtx.globalAlpha = alpha;
      targetCtx.fillStyle = "#fffef2";
      targetCtx.beginPath();
      targetCtx.ellipse(point.x, point.y, size * 0.40, size * 1.72, 0, 0, Math.PI * 2);
      targetCtx.fill();

      targetCtx.globalAlpha = 1;
    }

    function drawRolePoints(targetCtx, roleKey) {
      const role = ROLE_META_MAP[roleKey];
      const layout = getLayout(roleKey);
      const pts = constellationPoints[roleKey] || [];
      let alpha = 0.98;
      let size = layout.size;

      if (activeRole === "all" && roleKey === "unit_manager") {
        alpha = 0.72;
        size = 1.55;
      } else if (activeRole === "unit_manager") {
        alpha = 0.86;
        size = 1.75;
      }

      pts.forEach((point) => drawPoint(targetCtx, point, size, alpha));
    }

    function renderStaticScene() {
      if (!stageWidth || !stageHeight) return;
      staticCtx.clearRect(0, 0, stageWidth, stageHeight);
      drawBackground(staticCtx);

      if (activeRole === "all") {
        drawAllRoleLines(staticCtx);
        ROLE_ORDER.forEach((roleKey) => drawRolePoints(staticCtx, roleKey));
      } else {
        drawSingleRoleLines(staticCtx, activeRole);
        drawRolePoints(staticCtx, activeRole);
      }
    }

    function drawShipFrame(now) {
      if (!shipImage || !shipImage.complete) return;

      const elapsed = now / 1000;
      const cycle = activeRole === "all" ? 10 : 8;
      const t = (elapsed % cycle) / cycle;

      let startX = stageWidth * 0.12;
      let startY = stageHeight * 0.88;
      let endX;
      let endY;

      if (activeRole === "all") {
        endX = stageWidth * 1.06;
        endY = stageHeight * -0.03;
      } else {
        const layout = ROLE_META_MAP[activeRole].single;
        endX = stageWidth * Math.min(1.03, layout.cx + 0.16);
        endY = stageHeight * Math.max(-0.03, layout.cy - 0.18);
      }

      const eased = 1 - Math.pow(1 - t, 2.7);
      const x = startX + (endX - startX) * eased;
      const y = startY + (endY - startY) * eased + Math.sin(t * Math.PI * 2.1) * 3.5;
      const angle = (-12 + 22 * eased) * Math.PI / 180;

      let alpha = 1;
      if (t < 0.04) alpha = t / 0.04;
      else if (t > 0.99) alpha = (1 - t) / 0.01;

      const baseSize = isMobile() ? Math.min(88, stageWidth * 0.12) : Math.min(96, stageWidth * 0.10);
      const w = Math.max(60, baseSize);
      const h = w;

      ctx.save();
      ctx.globalAlpha = Math.max(0, Math.min(1, alpha));
      ctx.translate(x, y);
      ctx.rotate(angle);
      ctx.drawImage(shipImage, -w / 2, -h / 2, w, h);
      ctx.restore();
      ctx.globalAlpha = 1;
    }

    function drawFrame(now) {
      ctx.clearRect(0, 0, stageWidth, stageHeight);
      ctx.drawImage(staticCanvas, 0, 0, stageWidth, stageHeight);
      drawTwinkleStars(ctx, now);
      drawShipFrame(now);
      animationId = requestAnimationFrame(drawFrame);
    }

    function updateLabels() {
      const single = isSingleRole();
      const mobile = isMobile();

      Object.entries(allLabels).forEach(([roleKey, el]) => {
        if (!el) return;
        if (activeRole === "all" && !mobile) {
          el.classList.remove("hidden");
        } else {
          el.classList.add("hidden");
        }
      });

      if (single) {
        focusBadge.textContent = ROLE_META_MAP[activeRole].short;
        focusBadge.classList.remove("hidden");
        focusBadge.classList.add("active");
      } else {
        focusBadge.classList.add("hidden");
        focusBadge.classList.remove("active");
      }
    }

    function updateScrollHint() {
      if (!(isMobile() && activeRole === "all")) {
        scrollHint.classList.remove("show");
        return;
      }

      const canScroll = stageScroll.scrollWidth > stageScroll.clientWidth + 8;
      scrollHint.classList.toggle("show", canScroll);
    }

    function positionStageScroll() {
      if (!isMobile()) {
        stageScroll.scrollLeft = 0;
        return;
      }

      if (activeRole === "all") {
        const maxScroll = Math.max(0, stageScroll.scrollWidth - stageScroll.clientWidth);
        stageScroll.scrollLeft = maxScroll * 0.18;
      } else {
        stageScroll.scrollLeft = 0;
      }
    }

    function refreshView() {
      buildChips();
      updateStatus();
      stage.classList.toggle("single-role-mobile", isMobile() && isSingleRole());
      resizeCanvas();
      renderStaticScene();
      updateLabels();
      positionStageScroll();
      updateScrollHint();
    }

    resetBtn.addEventListener("click", () => {
      activeRole = "all";
      hintDismissed = false;
      refreshView();
    });

    stageScroll.addEventListener("scroll", () => {
      if (stageScroll.scrollLeft > 12) hintDismissed = true;
      updateScrollHint();
    }, { passive: true });

    window.addEventListener("resize", () => {
      refreshView();
    });

    document.addEventListener("visibilitychange", () => {
      if (document.hidden) {
        cancelAnimationFrame(animationId);
      } else {
        animationId = requestAnimationFrame(drawFrame);
      }
    });

    shipImage = new Image();
    shipImage.src = SHIP_SRC;
    shipImage.addEventListener("load", () => {
      cancelAnimationFrame(animationId);
      animationId = requestAnimationFrame(drawFrame);
    });

    buildTwinkleStars();
    resizeCanvas();
    loadLeaders().then(() => {
      cancelAnimationFrame(animationId);
      animationId = requestAnimationFrame(drawFrame);
    });
  </script>
</body>
</html>
