<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Waffle House History Bot</title>
  <style>
    :root {
      --yellow: #f5d547;
      --yellow-deep: #d4b000;
      --ink: #111111;
      --muted: #4f4f4f;
      --panel: #fffdf2;
      --panel-strong: #fff8db;
      --border: rgba(176, 150, 44, 0.18);
      --shadow: 0 18px 42px rgba(17, 17, 17, 0.16);
      --app-height: 100dvh;
    }

    * { box-sizing: border-box; }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      min-height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      color: var(--ink);
      background: transparent;
    }

    body {
      padding: 0;
      overflow: hidden;
    }

    .history-page {
      width: 100%;
      height: var(--app-height);
      min-height: var(--app-height);
      display: flex;
      align-items: stretch;
      justify-content: stretch;
      background: linear-gradient(180deg, rgba(255,255,255,0.98), rgba(255,250,231,0.98));
      overflow: hidden;
      overscroll-behavior: none;
    }

    .history-chat-panel {
      width: 100%;
      height: 100%;
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: linear-gradient(180deg, rgba(255,255,255,0.98), rgba(255,250,231,0.98));
      position: relative;
      overscroll-behavior: contain;
    }

    .history-chat-top {
      position: sticky;
      top: 0;
      z-index: 10;
      padding: max(18px, calc(18px + env(safe-area-inset-top))) 76px 14px 18px;
      background: linear-gradient(180deg, #ffe66a 0%, #f5d547 100%);
      border-bottom: 1px solid rgba(176, 150, 44, 0.18);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.55);
      flex: 0 0 auto;
    }

    .history-chat-eyebrow {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 7px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.82);
      color: #5d4e00;
      font-size: 0.76rem;
      font-weight: 900;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      margin-bottom: 10px;
      border: 1px solid rgba(176, 150, 44, 0.16);
    }

    .history-chat-top h1 {
      margin: 0 0 8px;
      font-size: clamp(1.2rem, 2.6vw, 1.5rem);
      line-height: 1.1;
      text-transform: uppercase;
      letter-spacing: 0.02em;
    }

    .history-chat-top p {
      margin: 0;
      color: #4a4a4a;
      line-height: 1.5;
      font-size: 0.95rem;
      max-width: 58ch;
    }

    .history-chat-close {
      position: fixed;
      top: max(16px, calc(16px + env(safe-area-inset-top)));
      right: max(16px, calc(16px + env(safe-area-inset-right)));
      width: 44px;
      height: 44px;
      border: none;
      border-radius: 50%;
      background: rgba(255,255,255,0.96);
      color: #111;
      font-size: 28px;
      line-height: 1;
      cursor: pointer;
      box-shadow: 0 10px 22px rgba(17,17,17,0.12);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      z-index: 30;
    }

    .history-chat-close:hover {
      transform: translateY(-1px);
    }

    .history-quick-toolbar {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      padding: 14px 18px 0;
      flex-wrap: wrap;
      flex: 0 0 auto;
    }

    .history-quick-title {
      font-size: 0.8rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 900;
      color: #6b5b00;
    }

    .history-more-toggle {
      border: 1px solid rgba(176, 150, 44, 0.18);
      border-radius: 999px;
      background: rgba(255,255,255,0.96);
      color: #4a3d00;
      font-weight: 800;
      padding: 8px 12px;
      cursor: pointer;
      box-shadow: 0 8px 16px rgba(17,17,17,0.06);
    }

    .history-quick-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .history-audio-toggle {
      border: 1px solid rgba(176, 150, 44, 0.18);
      border-radius: 999px;
      background: linear-gradient(180deg, #ffe66a, #f5d547);
      color: #111;
      font-weight: 900;
      padding: 8px 14px;
      cursor: pointer;
      box-shadow: 0 10px 20px rgba(17,17,17,0.08);
      white-space: nowrap;
    }

    .history-audio-toggle.is-muted {
      background: linear-gradient(180deg, #ffe66a, #f5d547);
      color: #111;
      box-shadow: 0 10px 20px rgba(17,17,17,0.08);
    }

    .history-quick-asks,
    .history-quick-asks-extra {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 12px 18px 0;
      flex: 0 0 auto;
    }

    .history-quick-asks-extra[hidden] {
      display: none;
    }

    .history-quick-ask {
      border: 1px solid rgba(176, 150, 44, 0.18);
      border-radius: 999px;
      background: rgba(255,255,255,0.94);
      color: #312a00;
      font-weight: 800;
      font-size: 0.84rem;
      line-height: 1.2;
      padding: 10px 12px;
      cursor: pointer;
      box-shadow: 0 8px 16px rgba(17,17,17,0.05);
    }

    .history-quick-ask:hover,
    .history-more-toggle:hover,
    .history-send-btn:hover,
    .history-ask-btn:hover,
    .history-cancel-btn:hover {
      transform: translateY(-1px);
    }

    .history-quick-ask:disabled,
    .history-ask-btn:disabled,
    .history-send-btn:disabled {
      opacity: 0.65;
      cursor: not-allowed;
      transform: none;
    }

    .history-chat-log {
      position: relative;
      flex: 1 1 auto;
      min-height: 0;
      overflow: auto;
      padding: 14px 18px 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
      scroll-padding-bottom: 18px;
      overscroll-behavior: contain;
      background: linear-gradient(
        180deg,
        rgba(255,255,255,0.95),
        rgba(255,250,231,0.95)
      );
      isolation: isolate;
    }

    .history-chat-log::before {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      width: 112%;
      height: 112%;
      transform: translate(-50%, -50%);
      background: url("Images/history-watermark.jpg") center center / cover no-repeat;
      opacity: 0.18;
      pointer-events: none;
      z-index: 0;
      transition: opacity 0.25s ease;
    }

    .history-chat-log.has-messages::before {
      opacity: 0.055;
    }

    .history-chat-log > * {
      position: relative;
      z-index: 1;
    }

    .history-msg {
      max-width: min(90%, 40ch);
      padding: 12px 14px;
      border-radius: 18px;
      box-shadow: 0 10px 20px rgba(17,17,17,0.05);
      line-height: 1.5;
      font-size: 0.95rem;
      white-space: normal;
      scroll-margin-top: 10px;
      scroll-margin-bottom: 18px;
    }

    .history-msg small {
      display: block;
      margin-bottom: 5px;
      font-size: 0.72rem;
      font-weight: 900;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      opacity: 0.75;
    }

    .history-msg.bot {
      align-self: flex-start;
      background: linear-gradient(180deg, #fffef7, #fff7dc);
      border: 1px solid rgba(176, 150, 44, 0.16);
    }

    .history-msg.user {
      align-self: flex-end;
      background: linear-gradient(180deg, #1d1d1d, #2a2a2a);
      color: #fff;
    }

    .history-chat-followup {
      display: grid;
      gap: 10px;
      padding: 12px 18px 10px;
      border-top: 1px solid rgba(176, 150, 44, 0.14);
      background: rgba(255,255,255,0.84);
      flex: 0 0 auto;
      max-height: min(34dvh, 280px);
      overflow: auto;
      -webkit-overflow-scrolling: touch;
    }

    .history-chat-followup[hidden] {
      display: none;
    }

    .history-followup-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .history-followup-grid input,
    .history-chat-composer input {
      width: 100%;
      border: 1px solid rgba(176, 150, 44, 0.18);
      border-radius: 14px;
      min-height: 46px;
      padding: 12px 14px;
      font: inherit;
      background: rgba(255,255,255,0.98);
      color: #111;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.7);
    }

    .history-followup-grid input:focus,
    .history-chat-composer input:focus {
      outline: 2px solid rgba(245, 213, 71, 0.48);
      outline-offset: 1px;
    }

    .history-chat-composer {
      flex: 0 0 auto;
      padding: 10px 18px max(16px, env(safe-area-inset-bottom));
      border-top: 1px solid rgba(176, 150, 44, 0.14);
      background: linear-gradient(180deg, rgba(255,255,255,0.98), rgba(255,248,220,0.98));
      display: grid;
      gap: 10px;
      position: relative;
      z-index: 2;
    }

    .history-followup-actions {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: stretch;
    }

    .history-cancel-btn {
      border: 1px solid rgba(176, 150, 44, 0.18);
      border-radius: 14px;
      min-height: 46px;
      padding: 0 18px;
      font-weight: 800;
      cursor: pointer;
      color: #4b3f00;
      background: rgba(255,255,255,0.96);
      box-shadow: 0 8px 16px rgba(17,17,17,0.05);
      white-space: nowrap;
    }

    .history-chat-composer-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: stretch;
    }

    .history-send-btn,
    .history-ask-btn {
      border: 1px solid rgba(176, 150, 44, 0.18);
      border-radius: 14px;
      min-height: 46px;
      padding: 0 18px;
      font-weight: 900;
      cursor: pointer;
      color: #111;
      background: linear-gradient(180deg, #ffe66a, #f5d547);
      box-shadow: 0 10px 20px rgba(17,17,17,0.08);
      white-space: nowrap;
    }

    @media (max-width: 720px) {
      .history-followup-grid {
        grid-template-columns: 1fr;
      }

      .history-chat-top {
        padding: max(16px, calc(16px + env(safe-area-inset-top))) 68px 12px 16px;
      }

      .history-quick-toolbar,
      .history-quick-asks,
      .history-quick-asks-extra,
      .history-chat-log,
      .history-chat-followup,
      .history-chat-composer {
        padding-left: 14px;
        padding-right: 14px;
      }

      .history-chat-composer-row,
      .history-followup-actions {
        grid-template-columns: 1fr;
      }

      .history-ask-btn,
      .history-send-btn,
      .history-cancel-btn {
        width: 100%;
      }

      .history-chat-followup {
        max-height: min(40dvh, 320px);
      }

      .history-quick-asks-extra:not([hidden]) {
        max-height: min(26dvh, 220px);
        overflow: auto;
        -webkit-overflow-scrolling: touch;
        padding-bottom: 6px;
      }

      .history-chat-log {
        padding-top: 12px;
        padding-bottom: 10px;
      }

      .history-chat-log::before {
        top: 50%;
        width: 128%;
        height: 128%;
        opacity: 0.16;
      }

      .history-chat-log.has-messages::before {
        opacity: 0.05;
      }
    }
  </style>
</head>
<body>
  <main class="history-page">
    <section class="history-chat-panel" id="history-chat-panel" aria-label="Waffle House History Bot">
      <div class="history-chat-top">
        <div class="history-chat-eyebrow">Since 1955</div>
        <button class="history-chat-close" id="history-chat-close" type="button" aria-label="Close history bot">&times;</button>
        <h1>Welcome to the Archive</h1>
        <p>Tap a question below for an instant answer, or ask your own question in the chat and I'll help you send it to the archivist.</p>
      </div>

      <div class="history-quick-toolbar">
        <div class="history-quick-title">Quick questions</div>

        <div class="history-quick-actions">
          <button
            class="history-audio-toggle"
            id="history-audio-toggle"
            type="button"
            aria-pressed="false"
            aria-label="Mute history audio"
            title="Mute history audio"
          >
            🔊 Sound On
          </button>

          <button
            class="history-more-toggle"
            id="history-more-toggle"
            type="button"
            aria-expanded="false"
            aria-controls="history-quick-asks-extra"
          >
            More facts
          </button>
        </div>
      </div>

      <div class="history-quick-asks" id="history-quick-asks">
        <button class="history-quick-ask" type="button" data-question="How long did pies and hashbrowns take to make at Unit #1?">Unit #1 prep time</button>
        <button class="history-quick-ask" type="button" data-question="Why is the sign yellow?">Why the sign is yellow</button>
        <button class="history-quick-ask" type="button" data-question="Tell me about Ms. Lucy.">Ms. Lucy</button>
        <button class="history-quick-ask" type="button" data-question="What happened in Indiana with the Waffle House name?">Indiana name story</button>
        <button class="history-quick-ask" type="button" data-question="How many locations does Waffle House have?">Location count</button>
        <button class="history-quick-ask" type="button" data-question="What does Waffle House sell each year?">Sales numbers</button>
      </div>

      <div class="history-quick-asks-extra" id="history-quick-asks-extra" hidden>
        <button class="history-quick-ask" type="button" data-question="What was Unit #1's daily average?">Unit #1 daily average</button>
        <button class="history-quick-ask" type="button" data-question="What did Unit #1 look like when it opened?">Original dining room</button>
        <button class="history-quick-ask" type="button" data-question="Who was the first franchise?">First franchise</button>
        <button class="history-quick-ask" type="button" data-question="What was the People Agenda?">People Agenda</button>
        <button class="history-quick-ask" type="button" data-question="What is Bert's Chili?">Bert's Chili</button>
        <button class="history-quick-ask" type="button" data-question="How many stores are company owned versus franchised?">Ownership mix</button>
        <button class="history-quick-ask" type="button" data-question="What is the farthest west Waffle House?">Farthest west</button>
        <button class="history-quick-ask" type="button" data-question="What is the farthest north Waffle House?">Farthest north</button>
      </div>

      <div class="history-chat-log" id="history-chat-log" aria-live="polite"></div>

      <div class="history-chat-followup" id="history-chat-followup" hidden>
        <div class="history-followup-grid">
          <input id="history-contact-name" type="text" placeholder="Your name" aria-label="Your name" />
          <input id="history-contact-unit" type="text" inputmode="numeric" pattern="[0-9]*" placeholder="Your unit number" aria-label="Your unit number" />
          <input id="history-contact-email" type="email" placeholder="Your email address" aria-label="Your email address" />
        </div>

        <div class="history-followup-actions">
          <button class="history-send-btn" id="history-send-email" type="button">Send to Archivist</button>
          <button class="history-cancel-btn" id="history-cancel-email" type="button">Not now</button>
        </div>
      </div>

      <div class="history-chat-composer">
        <div class="history-chat-composer-row" id="history-ask-row">
          <input id="history-question-input" type="text" placeholder="Ask a Waffle House History Question" aria-label="Ask a Waffle House History Question" />
          <button class="history-ask-btn" id="history-ask-btn" type="button">Ask</button>
        </div>
      </div>
    </section>
  </main>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const root = document.documentElement;

      const setAppHeight = () => {
        const height = window.visualViewport ? window.visualViewport.height : window.innerHeight;
        root.style.setProperty("--app-height", `${height}px`);
      };

      setAppHeight();
      window.addEventListener("resize", setAppHeight);
      window.addEventListener("orientationchange", () => setTimeout(setAppHeight, 180));

      if (window.visualViewport) {
        window.visualViewport.addEventListener("resize", setAppHeight);
        window.visualViewport.addEventListener("scroll", setAppHeight);
      }

      const historyFacts = [
        { answer: "At Unit #1, pies and hashbrowns took 2 days to make.", keywords: ["unit 1", "pies", "hashbrowns", "two days", "2 days", "prep", "make", "took"] },
        { answer: "Unit #1's daily average was $183.", keywords: ["unit 1", "daily average", "$183", "183", "average", "sales"] },
        { answer: "When Waffle House opened, it started with no booths, just stools and coffee benches.", keywords: ["booths", "stools", "coffee benches", "opened", "seating", "original seating"] },
        { answer: "The original sign was meant to mimic dripping syrup, but it changed to the block logo when the first off-highway location opened.", keywords: ["original sign", "dripping syrup", "block logo", "highway", "off highway", "sign changed"] },
        { answer: "Tom and Joe chose yellow for the sign so you could see it from far away, just like school buses are easy to see from far away.", keywords: ["yellow", "sign", "why yellow", "school bus", "far away", "visibility"] },
        { answer: "Quick Foods was the first franchise in 1967. It later became Northlake Foods and is now East Coast Waffles.", keywords: ["quick foods", "first franchise", "1967", "northlake foods", "east coast waffles", "franchise"] },
        { answer: "In Indiana, there was already a restaurant using the Waffle House name. Waffle House first opened there as WH Coffeehouse and Waffle & Steak before getting the rights to use the Waffle House name in that state.", keywords: ["indiana", "wh coffeehouse", "waffle and steak", "waffle steak", "rights", "name", "already a restaurant"] },
        { answer: "Ms. Lucy is one of Waffle House's longest-standing Hourly Associates with 47 years of service. She worked at Unit #2 starting in 1957 and retired in 2004. She was known as an amazing waitress who took great care of every Customer.", keywords: ["ms lucy", "lucy", "47 years", "unit 2", "1957", "retired", "2004", "waitress"] },
        { answer: "Waffle House introduced the People Agenda in the 1980s. It included associate benefits such as health insurance and vacation pay for full-time hourly associates.", keywords: ["people agenda", "1980s", "benefits", "health insurance", "vacation pay", "full time", "hourly associates"] },
        { answer: "Scattered, Smothered, and Covered lingo was created by associates and was added to the menu in 1984.", keywords: ["scattered", "smothered", "covered", "lingo", "menu", "1984", "hashbrown lingo"] },
        { answer: "Operator Bert Thornton created the recipe for Bert's Chili in Texas in 1984. Bert worked in operations for 38 years.", keywords: ["bert", "bert thornton", "bert's chili", "chili", "texas", "1984", "operations", "38 years"] },
        { answer: "Waffle House has over 2,000 locations in 25 states.", keywords: ["locations", "how many locations", "2,000", "2000", "25 states", "states"] },
        { answer: "The farthest west location is Unit #481 in Goodyear, Arizona.", keywords: ["farthest west", "goodyear", "arizona", "unit 481"] },
        { answer: "The farthest north location is Unit #1830 in Austinburg, Ohio.", keywords: ["farthest north", "austinburg", "ohio", "unit 1830"] },
        { answer: "Waffle House is about 94% company owned, with about 125 franchise locations.", keywords: ["94%", "company owned", "franchise locations", "125 franchise", "ownership"] },
        { answer: "Waffle House sells about 300 million eggs each year.", keywords: ["eggs", "300 million", "sell each year", "sales numbers", "annual sales"] },
        { answer: "Waffle House sells about 142 million waffles each year.", keywords: ["waffles", "142 million", "sell each year", "annual sales"] },
        { answer: "Waffle House sells about 328 million slices of bacon each year.", keywords: ["bacon", "328 million", "slices of bacon", "sell each year", "annual sales"] },
        { answer: "Waffle House sells about 200 million servings of hashbrowns each year.", keywords: ["hashbrowns", "200 million", "servings", "sell each year", "annual sales"] }
      ];

      const panel = document.getElementById("history-chat-panel");
      const log = document.getElementById("history-chat-log");
      const askBtn = document.getElementById("history-ask-btn");
      const input = document.getElementById("history-question-input");
      const quickAskButtons = Array.from(document.querySelectorAll(".history-quick-ask"));
      const followup = document.getElementById("history-chat-followup");
      const nameInput = document.getElementById("history-contact-name");
      const unitInput = document.getElementById("history-contact-unit");
      const emailInput = document.getElementById("history-contact-email");
      const sendEmailBtn = document.getElementById("history-send-email");
      const cancelEmailBtn = document.getElementById("history-cancel-email");
      const askRow = document.getElementById("history-ask-row");
      const moreToggle = document.getElementById("history-more-toggle");
      const extraQuickAsks = document.getElementById("history-quick-asks-extra");
      const closeBtn = document.getElementById("history-chat-close");
      const audioToggle = document.getElementById("history-audio-toggle");

      let pendingQuestion = "";
      let isResponding = false;
      let lastQuestionKey = "";
      let lastQuestionAt = 0;

      const syncChatLogState = () => {
        log.classList.toggle("has-messages", log.children.length > 0);
      };

      const resetQuickFacts = () => {
        moreToggle.setAttribute("aria-expanded", "false");
        moreToggle.textContent = "More facts";
        extraQuickAsks.hidden = true;
      };

      const prepareInteractionView = () => {
        setAppHeight();
      };

      const scrollChatToBottom = (behavior = "smooth") => {
        requestAnimationFrame(() => {
          log.scrollTo({ top: log.scrollHeight, behavior });
        });
      };

      const scrollLatestExchangeIntoView = (behavior = "smooth") => {
        requestAnimationFrame(() => {
          const messages = Array.from(log.querySelectorAll(".history-msg"));
          const botMsg = messages[messages.length - 1];
          const userMsg = messages[messages.length - 2];

          if (
            userMsg &&
            botMsg &&
            userMsg.dataset.role === "user" &&
            botMsg.dataset.role === "bot"
          ) {
            const topOffset = 8;
            log.scrollTo({
              top: Math.max(userMsg.offsetTop - topOffset, 0),
              behavior
            });
            return;
          }

          log.scrollTo({ top: log.scrollHeight, behavior });
        });
      };

      const resetHistoryShellView = () => {
        if (document.activeElement && typeof document.activeElement.blur === "function") {
          document.activeElement.blur();
        }

        input?.blur();
        nameInput?.blur();
        unitInput?.blur();
        emailInput?.blur();

        window.scrollTo(0, 0);
        document.body.scrollTop = 0;
        document.documentElement.scrollTop = 0;

        const page = document.querySelector(".history-page");
        page?.scrollTo(0, 0);
        panel?.scrollTo(0, 0);

        setTimeout(() => {
          window.scrollTo(0, 0);
          page?.scrollTo(0, 0);
          panel?.scrollTo(0, 0);
        }, 60);
      };

      const updateHistoryAudioButton = (muted) => {
        if (!audioToggle) return;

        audioToggle.classList.toggle("is-muted", muted);
        audioToggle.setAttribute("aria-pressed", String(muted));
        audioToggle.setAttribute("aria-label", muted ? "Unmute history audio" : "Mute history audio");
        audioToggle.setAttribute("title", muted ? "Unmute history audio" : "Mute history audio");
        audioToggle.textContent = muted ? "🔇 Sound Off" : "🔊 Sound On";
      };

      const requestHistoryAudioState = () => {
        if (window.parent && window.parent !== window) {
          window.parent.postMessage({ type: "request-history-audio-state" }, "*");
        }
      };

      const collapseExtraFactsForTyping = () => {
        if (window.innerWidth > 720) return;
        const expanded = moreToggle.getAttribute("aria-expanded") === "true";
        if (!expanded) return;
        resetQuickFacts();
      };

      const focusWithoutScroll = (el) => {
        if (!el) return;
        try {
          el.focus({ preventScroll: true });
        } catch {
          el.focus();
        }
      };

      const keepTypingAreaVisible = () => {
        collapseExtraFactsForTyping();
        setAppHeight();
        window.setTimeout(() => {
          scrollChatToBottom("smooth");
        }, 60);
      };

      const closeHistoryBot = () => {
        if (window.parent && window.parent !== window) {
          window.parent.postMessage("close-waffle-history-bot", "*");
        } else if (window.history.length > 1) {
          window.history.back();
        } else {
          window.location.href = "index.html";
        }
      };

      const escapeHtml = (text) =>
        text
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");

      const normalize = (text) =>
        (text || "")
          .toLowerCase()
          .replace(/&/g, " and ")
          .replace(/[^a-z0-9#\s$]/g, " ")
          .replace(/\s+/g, " ")
          .trim();

      const scoreFact = (question, fact) => {
        const q = normalize(question);
        let score = 0;

        fact.keywords.forEach((keyword) => {
          const k = normalize(keyword);
          if (!k) return;
          if (q.includes(k)) score += k.split(" ").length > 1 ? 4 : 2;
        });

        const qWords = new Set(q.split(" "));
        fact.keywords.forEach((keyword) => {
          normalize(keyword).split(" ").forEach((word) => {
            if (word && qWords.has(word)) score += 1;
          });
        });

        if (/how many|how much|annual|each year|sell/i.test(question)) {
          if (/million|sell each year|annual sales|sales numbers/.test(fact.keywords.join(" "))) score += 2;
        }

        if (/who|tell me about/i.test(question) && /ms lucy|bert|tom|joe/.test(normalize(fact.answer))) {
          score += 1;
        }

        return score;
      };

      const findAnswer = (question) => {
        const ranked = historyFacts
          .map((fact) => ({ fact, score: scoreFact(question, fact) }))
          .sort((a, b) => b.score - a.score);

        const top = ranked[0];
        const second = ranked[1];

        if (!top || top.score < 2) return null;
        if (top.score >= 5 && (!second || top.score >= second.score + 2)) return top.fact.answer;

        const related = ranked
          .filter((item) => item.score >= Math.max(3, top.score - 1))
          .slice(0, 3)
          .map((item) => "• " + item.fact.answer)
          .join("\n");

        return related.includes("\n")
          ? "Here are the closest matching history facts:\n" + related
          : top.fact.answer;
      };

      const setQuestionUiBusy = (busy) => {
        askBtn.disabled = busy;
        quickAskButtons.forEach((button) => {
          button.disabled = busy;
        });
      };

      const isRapidDuplicateQuestion = (question) => {
        const key = normalize(question);
        const now = Date.now();

        if (!key) return true;
        if (isResponding) return true;
        if (key === lastQuestionKey && now - lastQuestionAt < 900) return true;

        lastQuestionKey = key;
        lastQuestionAt = now;
        return false;
      };

      const addMessage = (role, text, behavior = "smooth") => {
        const cleanText = (text || "").trim();
        if (!cleanText) return null;

        const last = log.lastElementChild;
        if (last && last.dataset.role === role && last.dataset.message === cleanText) {
          return last;
        }

        const msg = document.createElement("div");
        msg.className = `history-msg ${role}`;
        msg.dataset.role = role;
        msg.dataset.message = cleanText;

        const label = role === "bot" ? "Waffle House History Bot" : "You";
        msg.innerHTML = `<small>${label}</small>${escapeHtml(cleanText).replace(/\n/g, "<br>")}`;

        log.appendChild(msg);
        syncChatLogState();
        scrollChatToBottom(behavior);
        return msg;
      };

      const hideFollowup = () => {
        followup.hidden = true;
        askRow.hidden = false;
        pendingQuestion = "";
        nameInput.value = "";
        unitInput.value = "";
        emailInput.value = "";
      };

      const showFollowup = (question) => {
        pendingQuestion = question;
        prepareInteractionView();
        followup.hidden = false;
        askRow.hidden = true;

        window.setTimeout(() => {
          keepTypingAreaVisible();
          focusWithoutScroll(nameInput);
        }, 70);
      };

      const seedWelcome = () => {
        log.innerHTML = "";
        hideFollowup();
        syncChatLogState();
        isResponding = false;
        setQuestionUiBusy(false);
      };

      const askHistoryQuestion = (question) => {
        const q = (question || "").trim();
        if (!q || isRapidDuplicateQuestion(q)) return;

        hideFollowup();
        prepareInteractionView();
        isResponding = true;
        setQuestionUiBusy(true);

        addMessage("user", q, "auto");

        window.setTimeout(() => {
          const answer = findAnswer(q);

          if (answer) {
            addMessage("bot", answer, "smooth");
            scrollLatestExchangeIntoView("smooth");
          } else {
            addMessage(
              "bot",
              "Great question. Waffle House history is still being written, and our archivist has access to photos, timelines, menus, memorabilia, and records that may help answer it.",
              "smooth"
            );
            showFollowup(q);
          }

          isResponding = false;
          setQuestionUiBusy(false);
        }, 160);
      };

      askBtn.addEventListener("click", () => {
        const q = (input.value || "").trim();
        if (!q) return;
        askHistoryQuestion(q);
        input.value = "";
      });

      input.addEventListener("focus", keepTypingAreaVisible);
      nameInput.addEventListener("focus", keepTypingAreaVisible);
      unitInput.addEventListener("focus", keepTypingAreaVisible);
      emailInput.addEventListener("focus", keepTypingAreaVisible);

      input.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          event.preventDefault();
          askBtn.click();
        }
      });

      quickAskButtons.forEach((button) => {
        button.addEventListener("click", () => askHistoryQuestion(button.dataset.question || ""));
      });

      moreToggle.addEventListener("click", () => {
        const expanded = moreToggle.getAttribute("aria-expanded") === "true";
        moreToggle.setAttribute("aria-expanded", String(!expanded));
        moreToggle.textContent = expanded ? "More facts" : "Fewer facts";
        extraQuickAsks.hidden = expanded;
        window.setTimeout(setAppHeight, 40);
      });

      unitInput.addEventListener("input", () => {
        unitInput.value = unitInput.value.replace(/\D+/g, "");
      });

      cancelEmailBtn.addEventListener("click", () => {
        hideFollowup();
        keepTypingAreaVisible();
      });

      closeBtn.addEventListener("click", closeHistoryBot);

      audioToggle?.addEventListener("click", () => {
        if (window.parent && window.parent !== window) {
          window.parent.postMessage({ type: "toggle-history-audio" }, "*");
        }
      });

      window.addEventListener("message", (event) => {
        const data = event.data;

        if (data && data.type === "history-shell-reset-view") {
          resetHistoryShellView();
          return;
        }

        if (data && data.type === "history-audio-state") {
          updateHistoryAudioButton(!!data.muted);
          return;
        }
      });

      sendEmailBtn.addEventListener("click", () => {
        const name = (nameInput.value || "").trim();
        const unit = (unitInput.value || "").trim();
        const email = (emailInput.value || "").trim();
        const question = (pendingQuestion || "").trim();

        if (!question) {
          addMessage("bot", "Ask a question first, then I can help you send it.");
          return;
        }

        if (!name || !unit || !email) {
          addMessage("bot", "Please enter your name, Unit number, and email before sending your question.");
          if (!name) focusWithoutScroll(nameInput);
          else if (!unit) focusWithoutScroll(unitInput);
          else focusWithoutScroll(emailInput);
          return;
        }

        const subject = `Waffle House History Question from ${name}`;
        const body = [
          `Name: ${name}`,
          `Unit Number: ${unit}`,
          `Email: ${email}`,
          "",
          "Question:",
          question
        ].join("\n");

        addMessage("bot", `Thanks, ${name}. I'm packaging your question for the archivist now.`);

        const mailto = `mailto:archive@wafflehouse.com?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;

        window.setTimeout(() => {
          window.location.href = mailto;
          addMessage("bot", "Your draft for the archivist is ready in your email app — just review and send.");
          hideFollowup();
          keepTypingAreaVisible();
        }, 520);
      });

      seedWelcome();
      requestHistoryAudioState();
    });
  </script>
</body>
</html>
