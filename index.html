<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2026 Associate Appreciation</title>
  <style>
    :root {
      --text: #111111;
      --muted: #4f4f4f;
      --muted-soft: #6b6b6b;
      --yellow: #f5d547;
      --yellow-dark: #d4b000;
      --yellow-soft: #fff7c8;
      --border: rgba(176, 150, 44, 0.18);
      --shadow: 0 10px 24px rgba(92, 77, 19, 0.08);
      --shadow-hover: 0 18px 38px rgba(92, 77, 19, 0.12);
      --max: 1120px;
      --media-width: 560px;
      --media-frame-min-height: 320px;
      --page-warmth: 0;
      --tilt-perspective: 1400px;
      --tilt-max-rotate: 12deg;
      --tilt-scale: 1.02;
      --game-card-shadow: 0 16px 30px rgba(17, 17, 17, 0.12);
    }

    * { box-sizing: border-box; }

    html {
      scroll-behavior: smooth;
      scroll-padding-top: 132px;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(
          circle at top left,
          color-mix(in srgb, #fffdf3 calc(100% - (var(--page-warmth) * 16%)), #fff2b1 calc(var(--page-warmth) * 16%)) 0%,
          color-mix(in srgb, #f9f5e9 calc(100% - (var(--page-warmth) * 18%)), #fff1b5 calc(var(--page-warmth) * 18%)) 32%,
          color-mix(in srgb, #f3efdf calc(100% - (var(--page-warmth) * 16%)), #f6e8b4 calc(var(--page-warmth) * 16%)) 100%
        );
      min-height: 100vh;
      transition: background 0.35s ease;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.18;
      background:
        radial-gradient(circle at 12% 16%, rgba(255, 237, 152, 0.28) 0%, rgba(255, 237, 152, 0) 20%),
        radial-gradient(circle at 84% 10%, rgba(255, 232, 131, 0.2) 0%, rgba(255, 232, 131, 0) 16%),
        radial-gradient(circle at 86% 72%, rgba(245, 213, 71, 0.15) 0%, rgba(245, 213, 71, 0) 18%);
      z-index: -1;
    }

    body.lightbox-open { overflow: hidden; }

    img {
      max-width: 100%;
      height: auto;
      display: block;
    }

    button { font: inherit; }

    #scroll-progress {
      position: fixed;
      top: 0;
      left: 0;
      height: 4px;
      width: 0%;
      background: linear-gradient(90deg, var(--yellow), #ffe66a);
      z-index: 9999;
      box-shadow: 0 2px 10px rgba(245, 213, 71, 0.45);
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(255, 255, 255, 0.88);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(176, 150, 44, 0.14);
      box-shadow: 0 4px 16px rgba(92, 77, 19, 0.05);
    }

    .topbar-inner {
      max-width: var(--max);
      margin: 0 auto;
      padding: 10px 16px 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 8px;
    }

    .logo-link {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .nav-logo {
      height: 90px;
      width: auto;
      object-fit: contain;
      transition: transform 0.3s ease;
    }

    .nav-logo:hover { transform: scale(1.05); }

    .mini-nav-wrap {
      width: 100%;
      max-width: 900px;
      overflow-x: auto;
      overflow-y: hidden;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      overscroll-behavior-x: contain;
    }

    .mini-nav-wrap::-webkit-scrollbar { display: none; }

    .mini-nav {
      display: flex;
      gap: 10px;
      justify-content: flex-start;
      min-width: max-content;
      padding: 2px 2px 8px;
    }

    .mini-nav a {
      text-decoration: none;
      color: #343434;
      background: rgba(255, 255, 255, 0.78);
      border: 1px solid rgba(176, 150, 44, 0.12);
      border-radius: 999px;
      padding: 9px 14px;
      font-size: 0.88rem;
      font-weight: 700;
      white-space: nowrap;
      box-shadow: 0 4px 10px rgba(92, 77, 19, 0.05);
      transition: transform 0.18s ease, background 0.18s ease, border-color 0.18s ease;
      touch-action: manipulation;
      position: relative;
      z-index: 1;
    }

    .mini-nav a:hover,
    .mini-nav a.active {
      background: rgba(255, 247, 200, 0.96);
      border-color: rgba(212, 176, 0, 0.28);
      transform: translateY(-1px);
    }

    .sections {
      max-width: var(--max);
      margin: 0 auto;
      padding: 24px 24px 18px;
    }

    .divider-sparkle {
      width: min(240px, 65vw);
      height: 16px;
      margin: 0 auto 22px;
      position: relative;
      opacity: 0.92;
    }

    .divider-sparkle::before {
      content: "";
      position: absolute;
      inset: 7px 0 auto 0;
      height: 2px;
      border-radius: 999px;
      background: linear-gradient(
        90deg,
        rgba(245, 213, 71, 0),
        rgba(245, 213, 71, 0.28),
        rgba(255, 236, 145, 0.9),
        rgba(245, 213, 71, 0.28),
        rgba(245, 213, 71, 0)
      );
      overflow: hidden;
    }

    .divider-sparkle::after {
      content: "";
      position: absolute;
      top: 3px;
      left: -18%;
      width: 28%;
      height: 10px;
      background: radial-gradient(circle, rgba(255,255,255,0.9) 0%, rgba(255,244,182,0.75) 35%, rgba(255,244,182,0) 72%);
      filter: blur(1px);
      animation: dividerShimmer 4.8s linear infinite;
    }

    @keyframes dividerShimmer {
      0% { left: -20%; }
      100% { left: 92%; }
    }

    .section {
      width: 100%;
      max-width: 900px;
      margin: 0 auto 30px;
      padding: 22px 20px 24px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.92), rgba(247, 249, 235, 0.74));
      border: 1px solid var(--border);
      border-radius: 28px;
      box-shadow: var(--shadow);
      transition: transform 0.35s ease, box-shadow 0.35s ease, border-color 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .section:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-hover);
      border-color: rgba(212, 176, 0, 0.28);
    }

    .section.featured-section {
      border-color: rgba(245, 213, 71, 0.42);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.95), rgba(252, 248, 221, 0.84));
    }

    .section-head {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 8px;
      margin-bottom: 22px;
      flex-wrap: wrap;
    }

    .section-kicker {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 7px 12px;
      border-radius: 999px;
      font-size: 0.76rem;
      line-height: 1;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      background: rgba(255, 247, 200, 0.92);
      color: #6f5f00;
      border: 1px solid rgba(212, 176, 0, 0.18);
      box-shadow: 0 4px 12px rgba(92, 77, 19, 0.06);
    }

    .section h2 {
      margin: 0 0 2px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      font-size: clamp(1.18rem, 2vw, 1.8rem);
      text-align: center;
    }

    .section h3 {
      margin: 0;
      text-align: center;
      font-size: clamp(1.05rem, 1.8vw, 1.25rem);
      letter-spacing: 0.01em;
    }

    .section p {
      color: var(--muted);
      line-height: 1.78;
      margin: 22px auto 0;
      max-width: 40ch;
      text-align: center;
      font-size: 1rem;
    }

    .section-image-wrap {
      width: 100%;
      max-width: var(--media-width);
      margin: 0 auto;
    }

    .section-image-link {
      display: block;
      width: 100%;
      border-radius: 20px;
      overflow: visible;
      border: 1px solid rgba(176, 150, 44, 0.14);
      background: #fff;
      cursor: zoom-in;
      position: relative;
      box-shadow: 0 8px 22px rgba(92, 77, 19, 0.06);
    }

    .media-frame {
      width: 100%;
      min-height: clamp(220px, 42vw, var(--media-frame-min-height));
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(180deg, #ffffff 0%, #fcfcf8 100%);
      position: relative;
      overflow: hidden;
      border-radius: 20px;
    }

    .media-frame img {
      width: 100%;
      height: auto;
      object-fit: contain;
      transition: transform 0.4s ease;
    }

    .section-image-link:hover .media-frame img { transform: scale(1.03); }
    .section-copy { margin-top: 20px; }

    .links,
    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 22px;
      justify-content: center;
    }

    .section-link,
    .song-toggle {
      text-decoration: none;
      color: #111;
      background: var(--yellow);
      border: 1px solid rgba(176, 150, 44, 0.18);
      transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
      position: relative;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
      box-shadow: 0 2px 0 rgba(92, 77, 19, 0.1), 0 8px 18px rgba(92, 77, 19, 0.08);
    }

    .section-link {
      padding: 12px 18px;
      min-height: 46px;
      border-radius: 999px;
      font-weight: 800;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      cursor: pointer;
    }

    .section-link:hover,
    .song-toggle:hover {
      transform: translateY(-2px);
      box-shadow: 0 2px 0 rgba(92, 77, 19, 0.1), 0 12px 22px rgba(92, 77, 19, 0.12);
      background: #ffe66a;
    }

    .section-link.secondary {
      background: rgba(255, 255, 255, 0.92);
      color: #2b2b2b;
      border-color: rgba(212, 176, 0, 0.28);
    }

    .pressable { will-change: transform; }
    .pressable.is-pressing {
      transform: scale(0.965);
      box-shadow: 0 1px 0 rgba(92, 77, 19, 0.08), 0 4px 10px rgba(92, 77, 19, 0.1);
    }

    .pressable.rebound { animation: pressRebound 220ms ease-out; }
    @keyframes pressRebound {
      0% { transform: scale(0.97); }
      55% { transform: scale(1.025); }
      100% { transform: scale(1); }
    }

    .ripple {
      position: absolute;
      border-radius: 50%;
      transform: translate(-50%, -50%) scale(0);
      pointer-events: none;
      background: rgba(255, 255, 255, 0.55);
      animation: rippleAnim 520ms ease-out forwards;
    }

    @keyframes rippleAnim {
      to {
        transform: translate(-50%, -50%) scale(1);
        opacity: 0;
      }
    }

    .hero-card {
      background: rgba(255, 255, 255, 0.9);
      border-radius: 28px;
      padding: 18px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      max-width: 760px;
      width: 100%;
      position: relative;
      border: 1px solid rgba(176, 150, 44, 0.12);
      box-shadow: 0 14px 30px rgba(92, 77, 19, 0.06);
    }

    .hero-copy {
      width: 100%;
      max-width: 760px;
      margin: 0 auto 18px;
      text-align: center;
    }

    #hero .eyebrow {
      display: block;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      font-size: clamp(12px, 1.7vw, 18px);
      line-height: 1.25;
      color: #7b6c00;
      font-weight: 800;
      margin-bottom: 10px;
      white-space: normal;
    }

    #hero h1 {
      margin: 0;
      font-size: clamp(32px, 4vw, 56px);
      line-height: 0.98;
      text-transform: uppercase;
      letter-spacing: -0.03em;
      text-align: center;
      text-wrap: balance;
    }

    .hero-image {
      width: 100%;
      display: flex;
      justify-content: center;
      margin-top: 8px;
      position: relative;
    }

    .hero-image img {
      display: block;
      width: 100%;
      max-width: 760px;
      height: auto;
      margin: 0 auto;
      border-radius: 24px;
      will-change: transform;
    }

    .song-card {
      width: 100%;
      max-width: 760px;
      margin: 0 auto;
      padding: 20px;
      border: 1px solid rgba(176, 150, 44, 0.12);
      border-radius: 24px;
      background: linear-gradient(180deg, #fffdf2 0%, #f9f8eb 52%, #f2f6e0 100%);
      box-shadow: 0 10px 24px rgba(92, 77, 19, 0.06);
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .song-card.audio-playing {
      border-color: rgba(245, 213, 71, 0.9);
      box-shadow: 0 12px 30px rgba(92, 77, 19, 0.08), 0 0 0 1px rgba(245, 213, 71, 0.45), 0 0 28px rgba(245, 213, 71, 0.2);
    }

      max-width: 560px;
      margin
